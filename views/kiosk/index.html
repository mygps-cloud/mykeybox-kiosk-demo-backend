<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyKeyBox</title>
    <style>
        @font-face { font-family: 'Montserrat'; src: url('assets/fonts/Montserrat-Bold.ttf') format('truetype'); }
        @font-face { font-family: 'MontserratRegular'; src: url('assets/fonts/Montserrat-Regular.ttf') format('truetype'); }
        @font-face { font-family: 'Prompt'; src: url('assets/fonts/Prompt-Bold.ttf') format('truetype'); }
        @font-face { font-family: 'RussoOne'; src: url('assets/fonts/RussoOne-Regular.ttf') format('truetype'); }

        :root { --color-main: #FEDC01; --color-dark: #0D0D0D; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; font-weight: normal; }
        body {
            min-height: 100vh; background: url('assets/image/bg.svg') center fixed;
            color: var(--color-main); font-family: Inter, -apple-system, sans-serif;
            font-size: 15px; font-weight: bold; user-select: none; cursor: none;
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        * { -webkit-tap-highlight-color: rgba(0, 0, 0, 0.3); }
        button { outline: none; border: none; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .screen.active { display: flex; }

        /* ── WELCOME ── */
        #welcome { cursor: pointer; }
        .logo-img { position: absolute; top: 5px; left: 10px; height: 120px; z-index: 100; }
        .unique-code { position: absolute; z-index: 100000; top: 5px; right: 10px; font-family: RussoOne, sans-serif; font-size: 25px; }
        .unique-code .code-title { color: white; } .unique-code .code { color: var(--color-main); }
        .homepage .welcome-text { margin-top: 70px; font-size: 70px; color: white; text-align: center; font-family: Montserrat, sans-serif; }
        .homepage .mykeybox-text { font-size: 170px; color: var(--color-main); text-align: center; font-family: RussoOne, sans-serif; }
        .homepage .press-to-start { color: var(--color-dark); background-color: var(--color-main); border-radius: 34px; font-size: 50px; padding: 28px 48px; margin-top: 70px; font-family: Montserrat, sans-serif; border: none; cursor: pointer; }
        .homepage .version { font-size: 12px; color: #555; margin-top: 20px; font-family: MontserratRegular, sans-serif; }
        .door-status { position: absolute; left: 14px; bottom: 30px; z-index: 1000; background: rgba(30,30,30,0.85); border-radius: 12px; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.1); }
        .door-status-header { color: #FEDC01; font-size: 12px; text-align: center; margin-bottom: 8px; letter-spacing: 2px; font-family: Montserrat, sans-serif; }
        .door-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 5px; }
        .door-cell { width: 38px; height: 34px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; border: 2px solid transparent; font-family: Montserrat, sans-serif; }
        .door-cell.free { background: rgba(254,220,1,0.12); border-color: rgba(254,220,1,0.6); color: #FEDC01; }
        .door-cell.busy { background: rgba(82,254,1,0.1); border-color: rgba(82,254,1,0.6); color: #52FE01; }

        /* ── CODE SCREEN ── */
        #code-screen .enter-code-text { margin-top: 10px; text-align: center; }
        #code-screen .enter-code-text .color-white { color: white; font-size: 30px; font-family: Montserrat, sans-serif; }
        #code-screen .enter-code-text .color-main { color: var(--color-main); font-size: 30px; font-family: Montserrat, sans-serif; }
        .title-logo { font-family: RussoOne, sans-serif; color: var(--color-main); font-size: 40px; text-align: center; margin-bottom: 5px; }
        .code-container { position: relative; margin-top: 10px; }
        .code-wrapper { display: flex; justify-content: center; align-items: center; }
        .code-wrapper span.dash { font-size: 35px; color: white; margin: 0 10px; font-family: Prompt, sans-serif; line-height: 60px; }
        .code-wrapper input { pointer-events: none; width: 60px; height: 60px; background-color: #363636; border-radius: 12px; color: white; border: 3px solid rgba(0,0,0,0); font-size: 40px; margin: 4px; text-align: center; font-family: Prompt, sans-serif; transition: all 0.3s; outline: none; }
        .code-wrapper input.filled { border-color: var(--color-main); }
        .code-wrapper input.invalid { border-color: #FE0101 !important; }
        .code-wrapper input.valid { border-color: #52FE01 !important; }
        .message { height: 55px; font-size: 30px; text-align: center; font-family: Montserrat, sans-serif; }
        .message .invalid-msg { color: #FE0101; } .message .valid-msg { color: #52FE01; }
        .keyboard { display: flex; flex-wrap: wrap; width: 440px; margin: auto; justify-content: center; }
        .keyboard div { flex: calc(31% - 5px); margin: 5px; border-radius: 13px; font-size: 50px; text-align: center; height: 70px; background-color: #363636; color: white; padding: 8px; line-height: 60px; min-width: 110px; max-width: 110px; font-family: Montserrat, sans-serif; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
        .keyboard div.type-key { font-size: 45px; } .keyboard div.type-key.selected { opacity: 0.2; pointer-events: none; }
        .keyboard div.enter-key { background-color: var(--color-main); line-height: 1; display: flex; align-items: center; justify-content: center; }
        .keyboard div.delete-key { line-height: 1; background-color: #A9A9A9; display: flex; align-items: center; justify-content: center; }
        .keyboard div.disabled { opacity: 0.2; pointer-events: none; }
        .try-again-btn { color: var(--color-dark); background-color: var(--color-main); border-radius: 24px; font-size: 28px; padding: 18px 48px; margin-top: 100px; font-family: Montserrat, sans-serif; border: none; }
        .back-btn-circle { position: absolute; top: 20px; left: 20px; z-index: 100; cursor: pointer; }
        .cancel-btn { margin-top: 16px; padding: 14px 40px; background: none; border: 1px solid #444; color: #888; border-radius: 10px; font-size: 16px; font-family: Montserrat, sans-serif; }

        /* ── CAR SELECT ── */
        #car-screen { padding: 130px 20px 10px; justify-content: flex-start; }
        .car-screen-title { font-size: 26px; color: white; font-family: Montserrat, sans-serif; margin-bottom: 6px; }
        .car-screen-code { font-size: 16px; color: var(--color-main); font-family: Montserrat, sans-serif; margin-bottom: 8px; }
        .car-search-row { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 750px; margin-bottom: 8px; }
        .car-search-display {
            flex: 1; padding: 10px 16px; border-radius: 10px; border: 2px solid #363636;
            background: rgba(30,30,30,0.9); color: white; font-size: 18px; font-family: MontserratRegular, sans-serif;
            min-height: 44px; display: flex; align-items: center; cursor: pointer;
        }
        .car-search-display.active { border-color: var(--color-main); }
        .car-search-display .placeholder { color: #555; }
        .car-search-clear { padding: 10px 16px; background: #363636; color: #aaa; border-radius: 10px; font-size: 16px; font-family: Montserrat, sans-serif; cursor: pointer; border: none; }
        .car-list { width: 100%; max-width: 750px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-bottom: 6px; }
        .car-list::-webkit-scrollbar { width: 6px; } .car-list::-webkit-scrollbar-track { background: transparent; } .car-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .car-card { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 2px solid #363636; background: rgba(30,30,30,0.85); border-radius: 12px; cursor: pointer; transition: border-color 0.3s; }
        .car-card:hover, .car-card:active { border-color: var(--color-main); }
        .car-icon { width: 56px; height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .car-info { flex: 1; }
        .car-name { font-size: 16px; color: white; font-family: Montserrat, sans-serif; }
        .car-vin { font-size: 11px; color: #777; font-family: MontserratRegular, sans-serif; margin-top: 2px; letter-spacing: 1px; }
        .car-color-label { font-size: 13px; color: #aaa; font-family: MontserratRegular, sans-serif; white-space: nowrap; }

        /* On-screen keyboard */
        .osk { display: none; width: 100%; max-width: 750px; background: rgba(20,20,20,0.95); border-radius: 12px; padding: 6px; margin-bottom: 6px; border: 1px solid #333; }
        .osk.visible { display: block; }
        .osk-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
        .osk-key { min-width: 38px; height: 38px; border-radius: 8px; background: #363636; color: white; font-size: 18px; font-family: Montserrat, sans-serif; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; padding: 0 8px; transition: background 0.15s; }
        .osk-key:active { background: var(--color-main); color: var(--color-dark); }
        .osk-key.wide { min-width: 70px; font-size: 14px; }
        .osk-key.space { flex: 1; max-width: 200px; }

        /* ── CONFIRM SCREEN ── */
        #confirm-screen { padding: 130px 40px 30px; justify-content: flex-start; }
        .confirm-title { font-size: 26px; color: white; font-family: Montserrat, sans-serif; margin-bottom: 20px; }
        .confirm-card { width: 100%; max-width: 500px; background: rgba(30,30,30,0.9); border: 2px solid #363636; border-radius: 18px; padding: 24px; text-align: center; }
        .confirm-car-icon { margin: 0 auto 16px; }
        .confirm-car-name { font-size: 24px; color: white; font-family: Montserrat, sans-serif; margin-bottom: 6px; }
        .confirm-car-vin { font-size: 15px; color: #888; font-family: MontserratRegular, sans-serif; letter-spacing: 1.5px; margin-bottom: 6px; }
        .confirm-car-color { font-size: 15px; color: #aaa; font-family: MontserratRegular, sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .confirm-color-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); display: inline-block; }
        .confirm-question { font-size: 20px; color: var(--color-main); font-family: Montserrat, sans-serif; margin: 24px 0 20px; }
        .confirm-buttons { display: flex; gap: 20px; justify-content: center; }
        .confirm-btn { padding: 16px 50px; border-radius: 14px; font-size: 20px; font-family: Montserrat, sans-serif; cursor: pointer; border: none; }
        .confirm-btn.yes { background: var(--color-main); color: var(--color-dark); }
        .confirm-btn.no { background: none; border: 2px solid #555; color: #888; }

        /* ── DOOR SELECT ── */
        #door-select-screen { padding: 130px 40px 30px; justify-content: flex-start; }
        .door-select-title { font-size: 26px; color: white; font-family: Montserrat, sans-serif; margin-bottom: 6px; }
        .door-select-car { font-size: 15px; color: var(--color-main); font-family: Montserrat, sans-serif; margin-bottom: 20px; }
        .door-select-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; width: 100%; max-width: 500px; }
        .door-select-card { padding: 28px 20px; border: 3px solid #363636; background: rgba(30,30,30,0.85); border-radius: 18px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .door-select-card:hover { border-color: var(--color-main); }
        .door-select-card.occupied { opacity: 0.3; pointer-events: none; }
        .door-select-num { font-size: 48px; color: var(--color-main); font-family: RussoOne, sans-serif; margin-bottom: 8px; }
        .door-select-status { font-size: 14px; font-family: Montserrat, sans-serif; }
        .door-select-status.empty-st { color: #52FE01; } .door-select-status.occupied-st { color: #FE0101; }
        .door-select-car-info { font-size: 12px; color: #888; font-family: MontserratRegular, sans-serif; margin-top: 4px; }

        /* ── DOOR OPEN ── */
        .door-visual { width: 120px; height: 160px; border: 3px solid var(--color-main); border-radius: 10px; margin-bottom: 20px; animation: doorSwing 1.5s ease-in-out infinite; }
        @keyframes doorSwing { 0%,100% { transform: perspective(600px) rotateY(0deg); } 50% { transform: perspective(600px) rotateY(-30deg); } }
        .door-message { font-size: 36px; color: var(--color-main); font-weight: 700; margin-bottom: 8px; font-family: Montserrat, sans-serif; }
        .door-instruction { font-size: 22px; color: #aaa; margin-bottom: 8px; font-family: MontserratRegular, sans-serif; }
        .door-car-info { font-size: 16px; color: white; font-family: Montserrat, sans-serif; margin-bottom: 4px; }
        .door-car-vin { font-size: 13px; color: #777; font-family: MontserratRegular, sans-serif; letter-spacing: 1px; margin-bottom: 12px; }
        .door-timer { font-size: 14px; color: #555; font-family: MontserratRegular, sans-serif; }

        /* ── DONE ── */
        .done-check { font-size: 80px; color: #52FE01; margin-bottom: 16px; }
        .done-message { font-size: 30px; color: white; font-weight: 600; margin-bottom: 10px; font-family: Montserrat, sans-serif; }
        .done-details { font-size: 16px; color: #888; text-align: center; line-height: 1.8; font-family: MontserratRegular, sans-serif; }
    </style>
</head>
<body>

    <!-- WELCOME -->
    <div id="welcome" class="screen active homepage" onclick="showScreen('code-screen')">
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="unique-code"><span class="code-title">Device: </span><span class="code" id="welcome-device">DEMO-1</span></div>
        <div class="welcome-text">Welcome to</div>
        <div class="mykeybox-text">MyKeyBox</div>
        <div style="display:flex;flex-direction:column;align-items:center;">
            <button class="press-to-start" onclick="event.stopPropagation(); showScreen('code-screen')">Press to start</button>
        </div>
        <div class="version">version 1.2.0</div>
        <div class="door-status" id="welcome-boxes" onclick="event.stopPropagation()"></div>
    </div>

    <!-- CODE ENTRY -->
    <div id="code-screen" class="screen">
        <div class="back-btn-circle" onclick="goHome()"><svg width="55" height="55" viewBox="0 0 55 55" fill="none"><circle cx="27.5" cy="27.5" r="25" stroke="#FEDC01" stroke-width="2"/><path d="M32 15L20 27.5L32 40" stroke="#FEDC01" stroke-width="3" stroke-linecap="round"/></svg></div>
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="unique-code"><span class="code-title">Device: </span><span class="code">DEMO-1</span></div>
        <div class="title-logo">MyKeyBox</div>
        <div class="enter-code-text"><span class="color-white">Please enter your </span><span class="color-main">5 digit code</span></div>
        <div class="code-container"><div class="code-wrapper" id="code-boxes"></div></div>
        <div class="message" id="code-message"></div>
        <div id="code-keyboard">
            <div class="keyboard" id="numpad">
                <div class="type-key" onclick="setType('C')" id="key-C">C</div>
                <div class="type-key" onclick="setType('S')" id="key-S">S</div>
                <div class="type-key" onclick="setType('D')" id="key-D">D</div>
                <div onclick="codePress('1')">1</div><div onclick="codePress('2')">2</div><div onclick="codePress('3')">3</div>
                <div onclick="codePress('4')">4</div><div onclick="codePress('5')">5</div><div onclick="codePress('6')">6</div>
                <div onclick="codePress('7')">7</div><div onclick="codePress('8')">8</div><div onclick="codePress('9')">9</div>
                <div class="delete-key" onclick="codeBackspace()"><svg width="40" height="40" viewBox="0 0 40 40" fill="none"><g clip-path="url(#c1)"><path d="M26.67 13.33a1.67 1.67 0 00-2.36 0L20 17.64l-4.31-4.31a1.67 1.67 0 10-2.36 2.36L17.64 20l-4.31 4.31a1.67 1.67 0 102.36 2.36L20 22.36l4.31 4.31a1.67 1.67 0 102.36-2.36L22.36 20l4.31-4.31a1.67 1.67 0 000-2.36z" fill="#0D0D0D"/><path d="M20 0a20 20 0 100 40 20 20 0 000-40zm0 36.67a16.67 16.67 0 110-33.34 16.67 16.67 0 010 33.34z" fill="#0D0D0D"/></g><defs><clipPath id="c1"><rect width="40" height="40" fill="white"/></clipPath></defs></svg></div>
                <div onclick="codePress('0')">0</div>
                <div class="enter-key" onclick="codeSubmit()"><svg width="40" height="24" viewBox="0 0 40 29" fill="none"><path d="M40 17a5.7 5.7 0 00-1.69-3.98L26.06.82a2.86 2.86 0 00-4.03 0 2.84 2.84 0 000 4.03l9.4 9.3H2.86a2.86 2.86 0 000 5.67h28.57l-9.4 9.33a2.84 2.84 0 000 4.01 2.86 2.86 0 004.03 0l12.26-12.19A5.7 5.7 0 0040 17z" fill="#0D0D0D"/></svg></div>
            </div>
        </div>
        <div id="code-tryagain" style="display:none;"><div style="display:flex;justify-content:center;"><button class="try-again-btn" onclick="codeReset()">Try again</button></div></div>
    </div>

    <!-- CAR SELECT -->
    <div id="car-screen" class="screen">
        <div class="back-btn-circle" onclick="showScreen('code-screen')"><svg width="55" height="55" viewBox="0 0 55 55" fill="none"><circle cx="27.5" cy="27.5" r="25" stroke="#FEDC01" stroke-width="2"/><path d="M32 15L20 27.5L32 40" stroke="#FEDC01" stroke-width="3" stroke-linecap="round"/></svg></div>
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="car-screen-title">Select Vehicle</div>
        <div class="car-screen-code" id="car-screen-code"></div>
        <div class="car-search-row">
            <div class="car-search-display" id="search-display" onclick="toggleOSK()"><span class="placeholder">Search by VIN, brand, model...</span></div>
            <button class="car-search-clear" onclick="clearSearch()">Clear</button>
        </div>
        <div class="osk" id="osk">
            <div class="osk-row">
                <button class="osk-key" onclick="oskKey('Q')">Q</button><button class="osk-key" onclick="oskKey('W')">W</button><button class="osk-key" onclick="oskKey('E')">E</button><button class="osk-key" onclick="oskKey('R')">R</button><button class="osk-key" onclick="oskKey('T')">T</button><button class="osk-key" onclick="oskKey('Y')">Y</button><button class="osk-key" onclick="oskKey('U')">U</button><button class="osk-key" onclick="oskKey('I')">I</button><button class="osk-key" onclick="oskKey('O')">O</button><button class="osk-key" onclick="oskKey('P')">P</button>
            </div>
            <div class="osk-row">
                <button class="osk-key" onclick="oskKey('A')">A</button><button class="osk-key" onclick="oskKey('S')">S</button><button class="osk-key" onclick="oskKey('D')">D</button><button class="osk-key" onclick="oskKey('F')">F</button><button class="osk-key" onclick="oskKey('G')">G</button><button class="osk-key" onclick="oskKey('H')">H</button><button class="osk-key" onclick="oskKey('J')">J</button><button class="osk-key" onclick="oskKey('K')">K</button><button class="osk-key" onclick="oskKey('L')">L</button>
            </div>
            <div class="osk-row">
                <button class="osk-key" onclick="oskKey('Z')">Z</button><button class="osk-key" onclick="oskKey('X')">X</button><button class="osk-key" onclick="oskKey('C')">C</button><button class="osk-key" onclick="oskKey('V')">V</button><button class="osk-key" onclick="oskKey('B')">B</button><button class="osk-key" onclick="oskKey('N')">N</button><button class="osk-key" onclick="oskKey('M')">M</button><button class="osk-key wide" onclick="oskBackspace()">DEL</button>
            </div>
            <div class="osk-row">
                <button class="osk-key" onclick="oskKey('1')">1</button><button class="osk-key" onclick="oskKey('2')">2</button><button class="osk-key" onclick="oskKey('3')">3</button><button class="osk-key" onclick="oskKey('4')">4</button><button class="osk-key" onclick="oskKey('5')">5</button><button class="osk-key" onclick="oskKey('6')">6</button><button class="osk-key" onclick="oskKey('7')">7</button><button class="osk-key" onclick="oskKey('8')">8</button><button class="osk-key" onclick="oskKey('9')">9</button><button class="osk-key" onclick="oskKey('0')">0</button>
            </div>
            <div class="osk-row">
                <button class="osk-key space" onclick="oskKey(' ')">SPACE</button>
                <button class="osk-key wide" onclick="toggleOSK()">CLOSE</button>
            </div>
        </div>
        <div class="car-list" id="car-list"></div>
        <button class="cancel-btn" onclick="goHome()">CANCEL</button>
    </div>

    <!-- CONFIRM CAR -->
    <div id="confirm-screen" class="screen">
        <div class="back-btn-circle" onclick="showScreen('car-screen')"><svg width="55" height="55" viewBox="0 0 55 55" fill="none"><circle cx="27.5" cy="27.5" r="25" stroke="#FEDC01" stroke-width="2"/><path d="M32 15L20 27.5L32 40" stroke="#FEDC01" stroke-width="3" stroke-linecap="round"/></svg></div>
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="confirm-title">Confirm Vehicle</div>
        <div class="confirm-card">
            <div class="confirm-car-icon" id="confirm-car-icon"></div>
            <div class="confirm-car-name" id="confirm-car-name"></div>
            <div class="confirm-car-vin" id="confirm-car-vin"></div>
            <div class="confirm-car-color" id="confirm-car-color"></div>
        </div>
        <div class="confirm-question">Is this the correct vehicle?</div>
        <div class="confirm-buttons">
            <button class="confirm-btn yes" onclick="confirmCar()">CONFIRM</button>
            <button class="confirm-btn no" onclick="showScreen('car-screen')">BACK</button>
        </div>
    </div>

    <!-- DOOR SELECT -->
    <div id="door-select-screen" class="screen">
        <div class="back-btn-circle" onclick="showScreen('confirm-screen')"><svg width="55" height="55" viewBox="0 0 55 55" fill="none"><circle cx="27.5" cy="27.5" r="25" stroke="#FEDC01" stroke-width="2"/><path d="M32 15L20 27.5L32 40" stroke="#FEDC01" stroke-width="3" stroke-linecap="round"/></svg></div>
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="door-select-title">Select Door</div>
        <div class="door-select-car" id="door-select-car"></div>
        <div class="door-select-grid" id="door-select-grid"></div>
        <button class="cancel-btn" onclick="goHome()">CANCEL</button>
    </div>

    <!-- DOOR OPEN -->
    <div id="door-screen" class="screen">
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="door-visual"></div>
        <div class="door-message" id="door-message">DOOR IS OPEN</div>
        <div class="door-instruction" id="door-instruction">Take your key</div>
        <div class="door-car-info" id="door-car-info"></div>
        <div class="door-car-vin" id="door-car-vin"></div>
        <div class="door-timer" id="door-timer"></div>
    </div>

    <!-- DONE -->
    <div id="done-screen" class="screen">
        <img class="logo-img" src="assets/image/logo.png" alt="MyKeyBox">
        <div class="done-check">&#10003;</div>
        <div class="done-message" id="done-message">Done</div>
        <div class="done-details" id="done-details"></div>
    </div>

    <script>
        const API = '/api/kiosk'
        let selectedType = '', code = '', codeState = 'entry'
        let selectedCar = null, searchText = '', oskVisible = false
        let inactivityTimer = null, doorInterval = null

        // ── Car SVG icon (colored silhouette) ──
        function carSVG(hex, w=56, h=40) {
            return `<svg width="${w}" height="${h}" viewBox="0 0 56 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 28h40v4a2 2 0 01-2 2h-2a4 4 0 01-8 0H20a4 4 0 01-8 0h-2a2 2 0 01-2-2v-4z" fill="${hex}" opacity="0.7"/>
                <path d="M10 28V18a2 2 0 012-2h4l4-6h16l4 6h4a2 2 0 012 2v10H10z" fill="${hex}"/>
                <rect x="16" y="13" width="10" height="7" rx="1" fill="rgba(255,255,255,0.3)"/>
                <rect x="30" y="13" width="10" height="7" rx="1" fill="rgba(255,255,255,0.3)"/>
                <circle cx="16" cy="34" r="3" fill="${hex}" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
                <circle cx="40" cy="34" r="3" fill="${hex}" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
                <rect x="6" y="22" width="6" height="3" rx="1" fill="${hex}" opacity="0.8"/>
                <rect x="44" y="22" width="6" height="3" rx="1" fill="${hex}" opacity="0.8"/>
            </svg>`
        }

        // ── 20 Hardcoded Cars ──
        const CARS = [
            { id: 1,  year: 2024, brand: 'Toyota',     model: 'Camry',           vin: '4T1BZ1HK5RU123456', color: 'White',  hex: '#FFFFFF' },
            { id: 2,  year: 2024, brand: 'Honda',       model: 'Accord',          vin: '1HGCV2F34RA012345', color: 'Black',  hex: '#1A1A1A' },
            { id: 3,  year: 2023, brand: 'Ford',        model: 'F-150',           vin: '1FTFW1E85NFA56789', color: 'Blue',   hex: '#1E3A8A' },
            { id: 4,  year: 2024, brand: 'Chevrolet',   model: 'Silverado 1500',  vin: '3GCUYDED5RG234567', color: 'Red',    hex: '#DC2626' },
            { id: 5,  year: 2023, brand: 'BMW',         model: 'X5 xDrive40i',    vin: '5UXCR6C09R9A12345', color: 'Silver', hex: '#C0C0C0' },
            { id: 6,  year: 2024, brand: 'Mercedes',    model: 'C 300',           vin: 'W1KWF8DB3RR123456', color: 'Gray',   hex: '#6B7280' },
            { id: 7,  year: 2023, brand: 'Tesla',       model: 'Model 3',         vin: '5YJ3E1EA9PF234567', color: 'White',  hex: '#F5F5F5' },
            { id: 8,  year: 2024, brand: 'Toyota',      model: 'RAV4',            vin: '2T3P1RFV5RC345678', color: 'Blue',   hex: '#2563EB' },
            { id: 9,  year: 2023, brand: 'Honda',       model: 'CR-V',            vin: '7FARS6H38RE456789', color: 'Green',  hex: '#166534' },
            { id: 10, year: 2024, brand: 'Ford',        model: 'Mustang GT',      vin: '1FA6P8CF5R5567890', color: 'Yellow', hex: '#EAB308' },
            { id: 11, year: 2023, brand: 'Hyundai',     model: 'Tucson',          vin: '5NMJFDAL9RH678901', color: 'Gray',   hex: '#9CA3AF' },
            { id: 12, year: 2024, brand: 'Kia',         model: 'Telluride SX',    vin: '5XYP6DHC5RG789012', color: 'Black',  hex: '#171717' },
            { id: 13, year: 2023, brand: 'Nissan',      model: 'Altima SR',       vin: '1N4BL4DV5RN890123', color: 'Red',    hex: '#B91C1C' },
            { id: 14, year: 2024, brand: 'Jeep',        model: 'Grand Cherokee',  vin: '1C4RJKBG5R8901234', color: 'White',  hex: '#FAFAFA' },
            { id: 15, year: 2023, brand: 'Subaru',      model: 'Outback',         vin: '4S4BTAPC9R3012345', color: 'Green',  hex: '#15803D' },
            { id: 16, year: 2024, brand: 'Audi',        model: 'Q5 Premium',      vin: 'WA1BNAFY5R2123456', color: 'Blue',   hex: '#1D4ED8' },
            { id: 17, year: 2023, brand: 'Lexus',       model: 'RX 350',          vin: '2T2HZMDA5RC234567', color: 'Silver', hex: '#D1D5DB' },
            { id: 18, year: 2024, brand: 'Volkswagen',  model: 'Atlas SEL',       vin: '1V2NR2CA5RC345678', color: 'Brown',  hex: '#92400E' },
            { id: 19, year: 2023, brand: 'Mazda',       model: 'CX-5 Turbo',      vin: 'JM3KFBCM9R0456789', color: 'Red',    hex: '#EF4444' },
            { id: 20, year: 2024, brand: 'Dodge',       model: 'Charger R/T',     vin: '2C3CDXCT5RH567890', color: 'Orange', hex: '#EA580C' },
        ]

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
            document.getElementById(id).classList.add('active')
            resetInactivity()
            if (id === 'code-screen') {
                selectedType = ''; code = ''; codeState = 'entry'; selectedCar = null
                renderCodeBoxes(); updateTypeKeys()
                document.getElementById('code-message').innerHTML = ''
                document.getElementById('code-keyboard').style.display = ''
                document.getElementById('code-tryagain').style.display = 'none'
            }
            if (id === 'car-screen') {
                document.getElementById('car-screen-code').textContent = `Code: D-${code}`
                searchText = ''; oskVisible = false
                document.getElementById('osk').classList.remove('visible')
                updateSearchDisplay(); renderCarList()
            }
            if (id === 'welcome') loadWelcomeStatus()
        }
        function goHome() { selectedType = ''; code = ''; selectedCar = null; showScreen('welcome') }
        function resetInactivity() { clearTimeout(inactivityTimer); inactivityTimer = setTimeout(goHome, 90000) }

        // ── CODE ENTRY ──
        function renderCodeBoxes() {
            const w = document.getElementById('code-boxes'); let html = ''
            let typeCls = selectedType ? 'filled' : ''
            if (codeState === 'invalid') typeCls = 'invalid'
            if (codeState === 'valid') typeCls = 'valid'
            html += `<input class="${typeCls}" value="${selectedType}" readonly disabled /><span class="dash">-</span>`
            for (let i = 0; i < 5; i++) {
                let cls = i < code.length ? 'filled' : ''
                if (codeState === 'invalid') cls = 'invalid'
                if (codeState === 'valid') cls = 'valid'
                html += `<input class="${cls}" value="${i < code.length ? code[i] : ''}" readonly disabled />`
            }
            w.innerHTML = html
        }
        function updateTypeKeys() { ['C','S','D'].forEach(t => { const el = document.getElementById('key-'+t); if(selectedType===t) el.classList.add('selected'); else el.classList.remove('selected') }) }
        function setType(t) { if(codeState!=='entry') return; selectedType=t; renderCodeBoxes(); updateTypeKeys() }
        function codePress(d) { if(code.length>=5||codeState!=='entry') return; code+=d; renderCodeBoxes() }
        function codeBackspace() { if(codeState!=='entry') return; if(code.length>0){code=code.slice(0,-1)} else if(selectedType){selectedType='';updateTypeKeys()} renderCodeBoxes() }
        function codeSubmit() { if(selectedType&&code.length===5&&codeState==='entry') checkCode() }
        function codeReset() { selectedType='';code='';codeState='entry';selectedCar=null;renderCodeBoxes();updateTypeKeys();document.getElementById('code-message').innerHTML='';document.getElementById('code-keyboard').style.display='';document.getElementById('code-tryagain').style.display='none' }

        async function checkCode() {
            try {
                const res = await fetch(API+'/validate-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:selectedType,code})})
                const data = await res.json()
                if (data.success) {
                    codeState='valid'; renderCodeBoxes()
                    if (data.action==='place') {
                        document.getElementById('code-message').innerHTML='<span class="valid-msg">Code accepted!</span>'
                        setTimeout(()=>showScreen('car-screen'),800)
                    } else {
                        document.getElementById('code-message').innerHTML='<span class="valid-msg">Code accepted!</span>'
                        setTimeout(()=>showDoorScreen(`DOOR ${data.door_number} IS OPEN`,'Take the key',data.door_number,'retrieve',data.car_label,data.car_vin),800)
                    }
                } else {
                    codeState='invalid'; renderCodeBoxes()
                    document.getElementById('code-message').innerHTML=`<span class="invalid-msg">${data.message}</span>`
                    document.getElementById('code-keyboard').style.display='none'
                    document.getElementById('code-tryagain').style.display=''
                }
            } catch { codeState='invalid';renderCodeBoxes();document.getElementById('code-message').innerHTML='<span class="invalid-msg">Connection error</span>';document.getElementById('code-keyboard').style.display='none';document.getElementById('code-tryagain').style.display='' }
        }

        // ── ON-SCREEN KEYBOARD ──
        function toggleOSK() {
            oskVisible = !oskVisible
            document.getElementById('osk').classList.toggle('visible', oskVisible)
            document.getElementById('search-display').classList.toggle('active', oskVisible)
            resetInactivity()
        }
        function oskKey(ch) { searchText += ch; updateSearchDisplay(); renderCarList(); resetInactivity() }
        function oskBackspace() { searchText = searchText.slice(0,-1); updateSearchDisplay(); renderCarList(); resetInactivity() }
        function clearSearch() { searchText = ''; updateSearchDisplay(); renderCarList(); resetInactivity() }
        function updateSearchDisplay() {
            const el = document.getElementById('search-display')
            el.innerHTML = searchText ? searchText : '<span class="placeholder">Search by VIN, brand, model...</span>'
        }

        // ── CAR LIST ──
        function renderCarList() {
            const list = document.getElementById('car-list')
            const f = searchText.toLowerCase()
            const filtered = CARS.filter(c => !f || c.vin.toLowerCase().includes(f) || c.brand.toLowerCase().includes(f) || c.model.toLowerCase().includes(f) || c.color.toLowerCase().includes(f) || String(c.year).includes(f))
            list.innerHTML = filtered.map(c => `
                <div class="car-card" onclick="selectCar(${c.id})">
                    <div class="car-icon">${carSVG(c.hex)}</div>
                    <div class="car-info">
                        <div class="car-name">${c.year} ${c.brand} ${c.model}</div>
                        <div class="car-vin">${c.vin}</div>
                    </div>
                    <div class="car-color-label">${c.color}</div>
                </div>
            `).join('')
            if (!filtered.length) list.innerHTML = '<div style="color:#666;text-align:center;padding:40px;font-family:MontserratRegular,sans-serif;font-size:18px;">No vehicles found</div>'
        }

        function selectCar(id) {
            selectedCar = CARS.find(c => c.id === id)
            if (!selectedCar) return
            // Show confirmation screen
            document.getElementById('confirm-car-icon').innerHTML = carSVG(selectedCar.hex, 100, 72)
            document.getElementById('confirm-car-name').textContent = `${selectedCar.year} ${selectedCar.brand} ${selectedCar.model}`
            document.getElementById('confirm-car-vin').textContent = selectedCar.vin
            document.getElementById('confirm-car-color').innerHTML = `<span class="confirm-color-dot" style="background:${selectedCar.hex}"></span> ${selectedCar.color}`
            showScreen('confirm-screen')
        }

        function confirmCar() { showDoorSelectScreen() }

        // ── DOOR SELECT ──
        async function showDoorSelectScreen() {
            document.getElementById('door-select-car').textContent = `${selectedCar.year} ${selectedCar.brand} ${selectedCar.model} — ${selectedCar.color}`
            try {
                const res = await fetch(API+'/slots'); const data = await res.json()
                document.getElementById('door-select-grid').innerHTML = data.slots.map(s => {
                    const occ = s.status==='occupied'
                    return `<div class="door-select-card ${occ?'occupied':''}" onclick="${occ?'':`selectDoor(${s.door_number})`}">
                        <div class="door-select-num">${s.door_number}</div>
                        <div class="door-select-status ${occ?'occupied-st':'empty-st'}">${occ?'OCCUPIED':'EMPTY'}</div>
                        ${occ?`<div class="door-select-car-info">${s.label||''}</div>`:''}</div>`
                }).join('')
            } catch { document.getElementById('door-select-grid').innerHTML='<div style="color:#FE0101;font-family:Montserrat">Connection error</div>' }
            showScreen('door-select-screen')
        }

        async function selectDoor(doorNum) {
            try {
                const carLabel = `${selectedCar.year} ${selectedCar.brand} ${selectedCar.model}`
                const res = await fetch(API+'/place-key',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,door_number:doorNum,car_label:carLabel,car_vin:selectedCar.vin})})
                const data = await res.json()
                if (data.success) showDoorScreen(`DOOR ${doorNum} IS OPEN`,'Place the key inside',doorNum,'place',carLabel,selectedCar.vin)
                else alert(data.message||'Failed')
            } catch { alert('Connection error') }
        }

        // ── Welcome Status ──
        async function loadWelcomeStatus() {
            try {
                const res = await fetch(API+'/slots'); const data = await res.json()
                const el = document.getElementById('welcome-boxes')
                if (!data.slots.length) { el.innerHTML=''; return }
                let html = '<div class="door-status-header">BOXES</div><div class="door-grid">'
                data.slots.forEach(s => { html += `<div class="door-cell ${s.status==='occupied'?'busy':'free'}">${s.door_number}</div>` })
                el.innerHTML = html + '</div>'
            } catch {}
        }

        // ── Door Open ──
        function showDoorScreen(msg, inst, doorNum, action, carLabel, carVin) {
            document.getElementById('door-message').textContent = msg
            document.getElementById('door-instruction').textContent = inst
            document.getElementById('door-car-info').textContent = carLabel || ''
            document.getElementById('door-car-vin').textContent = carVin || ''
            showScreen('door-screen')
            let sec = 30; const t = document.getElementById('door-timer')
            if (doorInterval) clearInterval(doorInterval)
            doorInterval = setInterval(async()=>{
                sec--; t.textContent=`Auto-close in ${sec}s`
                try { const r=await fetch(API+'/door-states');const d=await r.json();if(d.states[doorNum-1]){clearInterval(doorInterval);showDoneScreen(action);return} } catch{}
                if(sec<=0){clearInterval(doorInterval);showDoneScreen(action)}
            },1000)
        }

        function showDoneScreen(action) {
            const labels = { place:'Key placed successfully', retrieve:'Key retrieved successfully' }
            document.getElementById('done-message').textContent = labels[action]||'Done'
            const carInfo = selectedCar ? `${selectedCar.year} ${selectedCar.brand} ${selectedCar.model}` : ''
            document.getElementById('done-details').innerHTML = `${selectedType}-${code}${carInfo?'<br>'+carInfo:''}<br>${new Date().toLocaleTimeString()}`
            showScreen('done-screen'); setTimeout(goHome, 5000)
        }

        loadWelcomeStatus(); setInterval(loadWelcomeStatus, 5000)
    </script>
</body>
</html>
